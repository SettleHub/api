services:
  notification-service:
    image: ghcr.io/settlehub/notification-service:latest
    container_name: notification-service
    restart: always
    ports:
      - "8001:8001"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      
      - NOTIFICATION_DB_URL=${NOTIFICATION_DB_URL:-jdbc:postgresql://localhost:5432/notification-service-db?sslmode=disable}
      - NOTIFICATION_DB_USERNAME=${NOTIFICATION_DB_USERNAME}
      - NOTIFICATION_DB_PASSWORD=${NOTIFICATION_DB_PASSWORD}
      
      - KAFKA_ADDRESS=${KAFKA_ADDRESS}

      - SMTP_SERVER_ADDRESS=${SMTP_SERVER_ADDRESS}
      - SMTP_SERVER_PORT=${SMTP_SERVER_PORT}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}

      - EUREKA_ADDRESS=${EUREKA_ADDRESS}

      - NOTIFICATION_SERVICE_IP=${NOTIFICATION_SERVICE_IP}
      
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          memory: 512M

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 1m 

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
