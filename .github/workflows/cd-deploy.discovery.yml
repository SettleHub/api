name: CD Pipeline (Deploy Discovery to Server)

on:
  workflow_run:
    workflows: ["CD Pipeline (Publish Discovery Image)"]
    types:
      - completed
    branches:
      - main

  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker Image'
        required: true
        default: 'latest'

jobs:
  deploy:
    runs-on: self-hosted
    
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Copy compose.yml to Target Machine
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DISCOVERY_SERVICE_DEPLOY_HOST }}
          username: ${{ secrets.DISCOVERY_SERVICE_DEPLOY_USER }}
          key: ${{ secrets.DISCOVERY_SERVICE_DEPLOY_SSH_KEY }}
          source: "services/discovery/compose.yml"
          target: "/opt/settlehub/discovery/"
          strip_components: 2

      - name: Deploy to Target Machine via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_TAG: ${{ github.event.inputs.image_tag || 'latest' }}
        with:
          host: ${{ secrets.DISCOVERY_SERVICE_DEPLOY_HOST }}
          username: ${{ secrets.DISCOVERY_SERVICE_DEPLOY_USER }}
          key: ${{ secrets.DISCOVERY_SERVICE_DEPLOY_SSH_KEY }}
          envs: IMAGE_TAG
          script: |
            cd /opt/settlehub/discovery/
            
            echo "EUREKA_INSTANCE_HOSTNAME=${{ secrets.DISCOVERY_SERVICE_DEPLOY_HOST }}" > .env
            
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            docker pull ghcr.io/settlehub/discovery-service:$IMAGE_TAG
            
            docker compose up -d
            
            docker image prune -a -f --filter "until=24h"

