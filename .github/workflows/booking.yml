name: Booking Pipeline

on:
  push:
    paths: ['services/booking/**']
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker Image'
        required: true
        default: 'latest'

jobs:
  ci:
    uses: ./.github/workflows/java-ci.yml
    with:
      working-directory: services/booking
      service-name: booking-service
    secrets: inherit

  cd-publish:
    needs: [ci]
    uses: ./.github/workflows/docker-cd.yml
    with:
      working-directory: services/booking
      image-name: booking-service
    secrets: inherit

  deploy:
    needs: [cd-publish]
    runs-on: self-hosted
    
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    environment: production
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Copy compose.yml to Target Machine
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.BOOKING_SERVICE_DEPLOY_HOST }}
          username: ${{ secrets.BOOKING_SERVICE_DEPLOY_USER }}
          key: ${{ secrets.BOOKING_SERVICE_DEPLOY_SSH_KEY }}
          source: "services/booking/compose.yml"
          target: "/opt/settlehub/booking/"
          strip_components: 2 

      - name: Deploy to Target Machine via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_TAG: ${{ github.event.inputs.image_tag || 'latest' }}
          BOOKING_DB_URL: ${{ secrets.BOOKING_DB_URL }}
          BOOKING_DB_USERNAME: ${{ secrets.BOOKING_DB_USERNAME }}
          BOOKING_DB_PASSWORD: ${{ secrets.BOOKING_DB_PASSWORD }}
          KAFKA_ADDRESS: ${{ secrets.KAFKA_ADDRESS }}
          EUREKA_ADDRESS: ${{ secrets.EUREKA_ADDRESS }}
          BOOKING_SERVICE_IP: ${{ secrets.BOOKING_SERVICE_IP }}
        with:
          host: ${{ secrets.BOOKING_SERVICE_DEPLOY_HOST }}
          username: ${{ secrets.BOOKING_SERVICE_DEPLOY_USER }}
          key: ${{ secrets.BOOKING_SERVICE_DEPLOY_SSH_KEY }}
          envs: IMAGE_TAG,BOOKING_DB_URL,BOOKING_DB_USERNAME,BOOKING_DB_PASSWORD,KAFKA_ADDRESS,EUREKA_ADDRESS,BOOKING_SERVICE_IP
          script: |
            mkdir -p /opt/settlehub/booking/
            cd /opt/settlehub/booking/

            echo "BOOKING_DB_URL=$BOOKING_DB_URL" > .env
            echo "BOOKING_DB_USERNAME=$BOOKING_DB_USERNAME" >> .env
            echo "BOOKING_DB_PASSWORD=$BOOKING_DB_PASSWORD" >> .env
            echo "KAFKA_ADDRESS=$KAFKA_ADDRESS" >> .env
            echo "EUREKA_ADDRESS=$EUREKA_ADDRESS" >> .env
            echo "BOOKING_SERVICE_IP=$BOOKING_SERVICE_IP" >> .env
            
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ghcr.io/settlehub/booking-service:$IMAGE_TAG
            docker compose up -d
            docker image prune -a -f --filter "until=24h"