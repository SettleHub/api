name: Storage Pipeline

on:
  push:
    paths: ['services/storage/**']
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker Image'
        required: true
        default: 'latest'

jobs:
  ci:
    uses: ./.github/workflows/java-ci.yml
    with:
      working-directory: services/storage
      service-name: storage-service
    secrets: inherit

  cd-publish:
    needs: [ci]
    uses: ./.github/workflows/docker-cd.yml
    with:
      working-directory: services/storage
      image-name: storage-service
    secrets: inherit

  deploy:
    needs: [cd-publish]
    runs-on: self-hosted
    
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    
    environment: production
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Copy compose.yml to Target Machine
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STORAGE_SERVICE_DEPLOY_HOST }}
          username: ${{ secrets.STORAGE_SERVICE_DEPLOY_USER }}
          key: ${{ secrets.STORAGE_SERVICE_DEPLOY_SSH_KEY }}
          source: "services/storage/compose.yml"
          target: "/opt/settlehub/storage/"
          strip_components: 2 

      - name: Deploy to Target Machine via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_TAG: ${{ github.event.inputs.image_tag || 'latest' }}
          STORAGE_DB_URL: ${{ secrets.STORAGE_DB_URL }}
          STORAGE_DB_USERNAME: ${{ secrets.STORAGE_DB_USERNAME }}
          STORAGE_DB_PASSWORD: ${{ secrets.STORAGE_DB_PASSWORD }}
          EUREKA_ADDRESS: ${{ secrets.EUREKA_ADDRESS }}
          STORAGE_SERVICE_IP: ${{ secrets.STORAGE_SERVICE_IP }}
        with:
          host: ${{ secrets.STORAGE_SERVICE_DEPLOY_HOST }}
          username: ${{ secrets.STORAGE_SERVICE_DEPLOY_USER }}
          key: ${{ secrets.STORAGE_SERVICE_DEPLOY_SSH_KEY }}
          envs: IMAGE_TAG,STORAGE_DB_URL,STORAGE_DB_USERNAME,STORAGE_DB_PASSWORD,EUREKA_ADDRESS,STORAGE_SERVICE_IP
          script: |
            mkdir -p /opt/settlehub/storage/
            cd /opt/settlehub/storage/

            echo "STORAGE_DB_URL=$STORAGE_DB_URL" > .env
            echo "STORAGE_DB_USERNAME=$STORAGE_DB_USERNAME" >> .env
            echo "STORAGE_DB_PASSWORD=$STORAGE_DB_PASSWORD" >> .env
            echo "EUREKA_ADDRESS=$EUREKA_ADDRESS" >> .env
            echo "STORAGE_SERVICE_IP=$STORAGE_SERVICE_IP" >> .env
            
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ghcr.io/settlehub/storage-service:$IMAGE_TAG
            docker compose up -d
            docker image prune -a -f --filter "until=24h"